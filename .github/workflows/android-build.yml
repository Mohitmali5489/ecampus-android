name: ECampus Web-Only Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Packages
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: "ECampusSecurePassword2026"
      KEY_ALIAS: "ecampus_key"
      KEY_PASSWORD: "ECampusSecurePassword2026"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          # Removed cache: 'gradle' because Android project is generated dynamically later

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to bypass Node 20 deprecation

      - name: Install Dependencies & Generate Android
        run: |
          npm install
          npx cap add android

      - name: Configure Android Permissions & Deep Links
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Inject Permissions
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />' $MANIFEST_PATH
          
          # Inject Safe Browsing metadata and Network Security Config link
          sed -i '/<application/a \        <meta-data android:name="android.webkit.WebView.EnableSafeBrowsing" android:value="true" />' $MANIFEST_PATH
          sed -i 's/<application/<application android:usesCleartextTraffic="false" android:networkSecurityConfig="@xml/network_security_config"/' $MANIFEST_PATH

          # Inject Deep Linking Filter inside MainActivity activity tags
          sed -i '/<intent-filter>/,/<\/intent-filter>/ { /<\/intent-filter>/a \            <intent-filter android:autoVerify="true">\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="https" android:host="mohitasdeveloper.github.io" android:pathPrefix="/ECampus/" />\n            </intent-filter>' $MANIFEST_PATH
          }

      - name: Inject WebView Configurations & Third-Party Cookies
        run: |
          JAVA_PATH="android/app/src/main/java/com/mohit/ecampus/MainActivity.java"
          cat << 'EOF' > $JAVA_PATH
          package com.mohit.ecampus;

          import android.os.Bundle;
          import android.webkit.CookieManager;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onStart() {
                  super.onStart();
                  WebView webView = getBridge().getWebView();
                  WebSettings settings = webView.getSettings();
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);
                  CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                  webView.setOverScrollMode(WebView.OVER_SCROLL_NEVER);
              }
          }
          EOF

      - name: Create Network Security Config File
        run: |
          mkdir -p android/app/src/main/res/xml
          cat << 'EOF' > android/app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">mohitasdeveloper.github.io</domain>
              </domain-config>
          </network-security-config>
          EOF

      - name: Sync Capacitor Changes
        run: npx cap sync android

      - name: Generate Keystore File
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ env.KEYSTORE_PASSWORD }} \
            -keypass ${{ env.KEY_PASSWORD }} \
            -dname "CN=Mohit, OU=ECampus, O=Developer, L=Kalyan, S=MH, C=IN"

      - name: Setup Gradle Sign Environment Variables
        run: |
          echo "RELEASE_STORE_FILE=release.keystore" >> android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ env.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ env.KEY_ALIAS }}" >> android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ env.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Inject Signing Configuration into build.gradle
        run: |
          GRADLE_PATH="android/app/build.gradle"
          sed -i '/buildTypes {/i \    signingConfigs {\n        release {\n            storeFile file(RELEASE_STORE_FILE)\n            storePassword RELEASE_STORE_PASSWORD\n            keyAlias RELEASE_KEY_ALIAS\n            keyPassword RELEASE_KEY_PASSWORD\n        }\n    }\n' $GRADLE_PATH
          sed -i '/release {/a \            signingConfig signingConfigs.release' $GRADLE_PATH

      - name: Make Gradle Executable
        run: chmod +x ./android/gradlew

      - name: Build Debug & Signed Release Packages
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECampus-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Signed Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECampus-Release-APK
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Signed Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECampus-Release-AAB
          path: android/app/build/outputs/bundle/release/*.aab
